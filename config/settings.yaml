project:
  name: research_assistant
  environment: dev

paths:
  root_dir: .
  local_database_dir: local_database
  dataset_metadata_dir: local_database/dataset_metadata
  dataset_metadata_files:
    - nasa_cmr_expanded_metadata.json
    - stac_metadata.json
    - copernicus_cds_metadata.json
    - CDSE_collections.json
  fulltext_paper_dir: local_database/fulltext_paper
  id_track_file: local_database/fulltext_paper/id_track.xlsx
  generated_dir: generated
  parsed_papers_dir: generated/parsed_papers
  debug_dir: generated/debug
  chroma_dir: generated/chroma
  evidence_cache_dir: generated/evidence_cache
  normalized_datasets_path: generated/normalized_datasets.jsonl
  paper_registry_path: generated/paper_registry.jsonl
  chunks_path: generated/chunks.jsonl
  dataset_aliases_path: local_database/dataset_metadata/dataset_aliases.json

llm:
  provider: openai
  default_model: gpt-4o-mini
  temperature: 0.1
  max_output_tokens: 1024

embeddings:
  provider: sentence_transformers
  model_name: BAAI/bge-small-en-v1.5
  batch_size: 64

pdf_processing:
  primary_extractor: pymupdf
  fallback_extractor: pdfplumber
  use_ocr: false
  detect_headings: true
  reconstruct_paragraphs: true
  remove_headers_footers: true
  remove_page_numbers: true
  chunk_strategy: heading_paragraph_first
  chunk_size_tokens: 1000
  chunk_overlap_tokens: 150

openalex:
  base_url: https://api.openalex.org
  email: fayefang@g.harvard.edu
  recent_top_k: 20
  impactful_top_k: 20
  timeout_seconds: 30

zenodo:
  base_url: https://zenodo.org/api
  top_k: 10
  timeout_seconds: 20
  type: dataset
  access_right: open

retrieval:
  dataset_top_k: 15
  chunk_top_k: 20
  # Phase 9: filter evidence block by relevance — drives OOS abstention
  min_dataset_similarity: 0.30
  min_paper_similarity: 0.25
  min_chunk_score: 0.30

reranking:
  # Paper scoring uses provenance-specific feature sets:
  #   local paper:    chunk_relevance + fulltext_bonus + recency + impact
  #   external paper: semantic_similarity + recency + impact
  # The two feature sets are mutually exclusive, so there's no double-counting.
  # Local max score = 0.85, external max score = 0.60 — local is naturally preferred
  # without any extra tier_bonus.
  paper_weights:
    chunk_relevance:      0.40   # local-only signal
    semantic_similarity:  0.40   # external-only signal
    fulltext_bonus:       0.25   # 1.0 if local else 0.0 (binary)
    recency_score:        0.10
    impact_score:         0.10
  paper_tier_quota:
    local:    7   # chunk-backed local papers
    external: 3   # OpenAlex metadata-only supplement
  dataset_weights:
    semantic_similarity: 0.35
    variable_match:      0.20
    literature_support:  0.25
    spatial_match:       0.10
    temporal_match:      0.10
  # Hard filter: when parsed_query.must_have_constraints.region/timescale is True,
  # drop candidates whose respective match score falls below these thresholds.
  must_have_gating:
    region_threshold:   0.3
    temporal_threshold: 0.3
  # literature_support is layered: baseline (has_doi / semantic_only) gets upgraded
  # by mention evidence if any is found. Take max.
  literature_support_scores:
    chunk_explicit_mention: 1.0   # dataset named in a retrieved local chunk
    abstract_mention:       0.85  # dataset named in a retrieved OpenAlex abstract
    has_doi:                0.7   # baseline for DOI-bearing candidates (Zenodo + authoritative archives)
    semantic_only:          0.5   # neither DOI nor mention; survived by vector match only
  spatial_temporal_default: 0.5

logging:
  save_debug_files: true
  level: INFO
